<!-- Caddyfile 编辑器模态框（Tailwind重构） -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 hidden" id="fileEditorModalCaddy">
  <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg w-full max-w-6xl relative">
    <div class="flex items-center justify-between px-4 py-2 border-b border-gray-200 dark:border-gray-700">
      <h5 class="text-lg font-semibold flex items-center gap-2" id="fileEditorModalLabelCaddy">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>网站管理/反向代理
        <small class="ml-2 text-gray-400" id="currentEditFilePath"></small>
      </h5>
      <button class="p-2 rounded hover:bg-gray-100 dark:hover:bg-gray-700" onclick="document.getElementById('fileEditorModalCaddy').classList.add('hidden')" aria-label="关闭">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
      </button>
    </div>
    <div class="p-4">
      <div id="visualEditorArea">
        <div class="flex items-center justify-between mb-3">
          <h5 class="text-base font-semibold">网站列表</h5>
          <button type="button" class="px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700 text-xs" onclick="openAddSiteModal()">
            <svg class="inline w-4 h-4 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>添加网站
          </button>
        </div>
        <div class="overflow-x-auto">
          <table class="min-w-full text-sm text-left text-gray-500 dark:text-gray-300 border rounded">
            <thead class="bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-gray-200">
              <tr>
                <th class="px-4 py-2">地址 (域名:端口)</th>
                <th class="px-4 py-2">类型</th>
                <th class="px-4 py-2">详情</th>
                <th class="px-4 py-2">操作</th>
              </tr>
            </thead>
            <tbody id="caddySiteListBody">
              <tr>
                <td colspan="4" class="text-center text-gray-400">暂无网站配置</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      <div id="manualEditorArea" class="mt-6 hidden">
        <textarea id="CaddyfileEditorContent" class="form-input w-full h-64 p-2 rounded border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-sm text-gray-800 dark:text-gray-100" spellcheck="false"></textarea>
        <div class="text-xs text-gray-400 mt-2">可视化编辑器功能支持的Caddyfile格式有限制，请参考官网模板来编辑</div>
      </div>
      <div class="flex items-center gap-4 mt-4">
        <input type="checkbox" class="form-checkbox" id="check_auto_https">
        <label for="check_auto_https" class="text-xs">自动配置HTTPS(无80/433端口不要开启)</label>
      </div>
      <div class="flex flex-wrap gap-2 mt-4">
        <button type="button" class="px-4 py-1 bg-cyan-500 text-white rounded hover:bg-cyan-600 text-xs" id="toggleEditorView" onclick="toggleEditorView()">切换文本编辑模式</button>
        <button type="button" class="px-4 py-1 bg-gray-200 dark:bg-gray-700 rounded hover:bg-gray-300 dark:hover:bg-gray-600 text-xs" onclick="document.getElementById('fileEditorModalCaddy').classList.add('hidden')">取消</button>
        <button type="button" class="px-4 py-1 bg-gray-200 dark:bg-gray-700 rounded hover:bg-gray-300 dark:hover:bg-gray-600 text-xs" onclick="gotoCaddyBaseConfigPage()">caddy服务配置</button>
        <button type="button" class="px-4 py-1 bg-green-600 text-white rounded hover:bg-green-700 text-xs" onclick="syncChangesToCaddyfileEditor();saveFileContent()">完成</button>
        <button type="button" class="px-4 py-1 bg-green-600 text-white rounded hover:bg-green-700 text-xs" onclick="reloadCaddy()">重载</button>
      </div>
    </div>
  </div>
</div>
<script>
  function gotoCaddyBaseConfigPage() {
    window.location.hash = '#ThirdPartyExtCaddy2';
  }
</script>
<!-- Add/Edit Site Modal -->
<div class="modal fixed inset-0 z-50 flex items-center justify-center bg-black/40 hidden" id="addEditSiteModal">
  <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg w-full max-w-2xl relative">
    <div class="flex items-center justify-between px-4 py-2 border-b border-gray-200 dark:border-gray-700">
      <h5 class="text-lg font-semibold" id="addEditSiteModalLabel">添加/编辑网站配置</h5>
      <button class="p-2 rounded hover:bg-gray-100 dark:hover:bg-gray-700" onclick="document.getElementById('addEditSiteModal').classList.add('hidden')" aria-label="关闭">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
      </button>
    </div>
    <div class="p-4">
      <form id="siteConfigForm" class="space-y-4">
        <input type="hidden" id="editSiteIndex">
        <div>
          <label for="siteAddress" class="block">网站地址 (域名:端口)</label>
          <input type="text" class="form-input w-full" id="siteAddress" placeholder="e.g. http://example.com:8080 或 :80">
          <div class="text-xs text-gray-400">可以是域名、IP、或仅端口 (如: :8080)。前缀 http:// 或 https:// 是可选的。</div>
        </div>
        <div>
          <label for="siteType" class="block">网站类型</label>
          <select class="form-input w-full" id="siteType" onchange="toggleSiteTypeFields()">
            <option value="respond">响应文本</option>
            <option value="file_server">静态文件服务</option>
            <option value="reverse_proxy">反向代理</option>
          </select>
        </div>
        <div id="respondFields" class="site-type-fields" >
          <label for="respondContent" class="block">响应内容</label>
          <textarea class="form-input w-full" id="respondContent" rows="3" placeholder="例如: Hello from Caddy!"></textarea>
        </div>
        <div id="fileServerFields" class="site-type-fields hidden">
          <label for="fileServerRoot" class="block">静态文件根目录</label>
          <input type="text" class="form-input w-full" id="fileServerRoot" placeholder="例如: /home/user/www">
        </div>
        <div id="reverseProxyFields" class="site-type-fields hidden">
          <label for="proxyTarget" class="block">反向代理目标地址</label>
          <input type="text" class="form-input w-full" id="proxyTarget" placeholder="例如: http://localhost:8081">
          <div class="flex items-center gap-2 mt-2">
            <input type="checkbox" class="form-checkbox" id="tlsInsecureSkipVerify">
            <label for="tlsInsecureSkipVerify" class="text-xs">忽略后端TLS证书错误 (tls_insecure_skip_verify)</label>
          </div>
        </div>
        <hr>
        <h5 class="text-base font-semibold">可选配置</h5>
        <div class="flex items-center gap-2 mt-2">
          <input type="checkbox" class="form-checkbox" id="enableBasicAuth" onchange="toggleBasicAuthFields()">
          <label for="enableBasicAuth" class="text-xs">启用Basic Auth</label>
        </div>
        <div id="basicAuthFields" class="hidden mt-2">
          <div>
            <label for="authUsername" class="block">用户名</label>
            <input type="text" class="form-input w-full" id="authUsername">
          </div>
          <div class="mt-2">
            <label for="authPassword" class="block">密码</label>
            <input type="password" class="form-input w-full" id="authPassword">
            <div class="text-xs text-gray-400">Caddyfile中密码会以bcrypt加密形式保存。</div>
          </div>
        </div>
        <div class="flex items-center gap-2 mt-2">
          <input type="checkbox" class="form-checkbox" id="enableTls" onchange="toggleTlsFields()">
          <label for="enableTls" class="text-xs">启用TLS (HTTPS)</label>
        </div>
        <div id="tlsFields" class="hidden mt-2">
          <div>
            <label for="tlsCertPath" class="block">TLS 证书路径 (.crt)</label>
            <input type="text" class="form-input w-full" id="tlsCertPath" placeholder="例如: /path/to/cert.crt">
          </div>
          <div class="mt-2">
            <label for="tlsKeyPath" class="block">TLS 密钥路径 (.key)</label>
            <input type="text" class="form-input w-full" id="tlsKeyPath" placeholder="例如: /path/to/key.key">
          </div>
        </div>
      </form>
    </div>
    <div class="flex justify-end gap-2 px-4 py-2 border-t border-gray-200 dark:border-gray-700">
      <button type="button" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded hover:bg-gray-300 dark:hover:bg-gray-600" onclick="document.getElementById('addEditSiteModal').classList.add('hidden')">取消</button>
      <button type="button" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700" onclick="saveSiteConfig()">保存网站</button>
    </div>
  </div>
</div>
