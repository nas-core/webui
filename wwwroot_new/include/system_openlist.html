<div id="ThirdPartyExtOpenlist" class="pt-16"></div>
<div class="p-6">
  <h3 class="text-lg font-bold mb-4">openlist 配置</h3>
  <div class="space-y-4">
    <div>
      <label for="ThirdPartyExtOpenlistDownLoadlink" class="block">openlist github下载地址 <button type="button" class="text-blue-600 underline text-xs" data-bs-toggle="modal" data-bs-target="#githubMirrorModal">设置 GitHub Mirror</button></label>
      <input type="text" class="form-input mt-1 block w-full" id="ThirdPartyExtOpenlistDownLoadlink" data-bind="ThirdPartyExt.Openlist.DownLoadlink">
      <div class="text-xs text-gray-400">like: https://github.com/OpenListTeam/OpenList/releases/download/v{ver}/openlist-{os}-{arch}.tar.gz</div>
    </div>
    <div>
      <label for="ThirdPartyExtOpenlistVersion" class="block">Version</label>
      <input type="text" class="form-input mt-1 block w-32" id="ThirdPartyExtOpenlistVersion" data-bind="ThirdPartyExt.Openlist.Version">
    </div>
    <div class="flex items-center gap-2">
      <input type="checkbox" class="form-checkbox" id="OpenlistAutoMountEnable" data-bind="ThirdPartyExt.Openlist.AutoStartEnable">
      <label for="OpenlistAutoMountEnable" class="ml-2">启用 OpenList 跟随启动</label>
    </div>
    <div>
      <label for="OpenlistBinPath" class="block">OpenList 路径 <button class="ml-2 px-2 py-1 bg-gray-200 rounded text-xs" onclick="downloadOpenlist()">下载OpenList到指定路径</button></label>
      <input type="text" class="form-input mt-1 block w-full" id="OpenlistBinPath" data-bind="ThirdPartyExt.Openlist.BinPath">
    </div>
    <div>
      <label for="ThirdPartyExtOpenlistDataPath" class="block">数据目录 <button class="ml-2 px-2 py-1 bg-gray-200 rounded text-xs" onclick="resetOpenListPassword()">重置密码</button></label>
      <input type="text" class="form-input mt-1 block w-full" id="ThirdPartyExtOpenlistDataPath" data-bind="ThirdPartyExt.Openlist.DataPath">
    </div>
    <div class="text-xs text-gray-400">OpenList 可以下载到和nascore 同目录下，并尝试解压，你也可以用其他方式自行下载安装。<br>如果自行安装的 OpenList 记得修改路径，或者自行安装成服务模式。</div>
  </div>
</div>
