<div id="system_server" class="pt-16"></div>
<div class="p-6">
  <h3 class="text-lg font-bold mb-4">服务器设置</h3>
  <div class="space-y-4">
    <div>
      <label for="HttpPort" class="block">HTTP 端口</label>
      <input type="number" class="form-input mt-1 block w-32" id="HttpPort" data-bind="Server.HttpPort">
    </div>
    <div class="flex items-center gap-2">
      <input type="checkbox" class="form-checkbox" id="HttpsEnable" data-bind="Server.HttpsEnable">
      <label for="HttpsEnable" class="ml-2">启用 HTTPS <span class="text-xs text-gray-400">如要启用建议配合lego证书管理或反向代理功能</span></label>
    </div>
    <div>
      <label for="HttpsPort" class="block">HTTPS 端口</label>
      <input type="number" class="form-input mt-1 block w-32" id="HttpsPort" data-bind="Server.HttpsPort">
    </div>
    <div>
      <label for="TlsCert" class="block">TLS 证书路径</label>
      <input type="text" class="form-input mt-1 block w-64" id="TlsCert" data-bind="Server.TlsCert">
    </div>
    <div>
      <label for="TlsKey" class="block">TLS 私钥路径</label>
      <input type="text" class="form-input mt-1 block w-64" id="TlsKey" data-bind="Server.TlsKey">
    </div>
    <div class="flex items-center gap-2">
      <input type="checkbox" class="form-checkbox" id="IsRunInServerLess" data-bind="Server.IsRunInServerLess">
      <label for="IsRunInServerLess" class="ml-2">ServerLess/Stateless 模式 <span class="text-xs text-gray-400">启用后，NasCore 将以顺序执行的方式执行后台任务。你也需要增加一个触发器定时触发，否则耗时较长的后台任务/计划任务可能无法成功执行。</span></label>
    </div>
    <div class="flex items-center gap-2">
      <input type="checkbox" class="form-checkbox" id="WebuiAndApiEnable" data-bind="Server.WebuiAndApiEnable">
      <label for="WebuiAndApiEnable" class="ml-2">启用 WebUI和api <span class="text-xs text-gray-400">关闭后后台也无法访问，你只能通过手动修改配置文件</span></label>
    </div>
    <div>
      <label for="WebUIPrefix" class="block">WebUI 前缀</label>
      <input type="text" class="form-input mt-1 block w-32" id="WebUIPrefix" data-bind="Server.WebUIPrefix">
    </div>
    <div class="flex items-center gap-2">
      <input type="checkbox" class="form-checkbox" id="WebDavEnable" data-bind="Server.WebDavEnable">
      <label for="WebDavEnable" class="ml-2">启用 WebDAV <span class="text-xs text-gray-400">路径是 /</span></label>
    </div>
  </div>
</div>
