<!-- 文件上传模态框 -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 hidden" id="uploadModal">
  <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg w-full max-w-2xl relative">
    <div class="flex items-center justify-between px-4 py-2 border-b border-gray-200 dark:border-gray-700">
      <h5 class="text-lg font-semibold flex items-center gap-2" id="uploadModalLabel">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>上传文件
        <small class="ml-2 text-gray-400" id="currentUploadPath"></small>
      </h5>
      <div class="flex items-center gap-2">
        <button class="p-2 rounded hover:bg-gray-100 dark:hover:bg-gray-700" id="minimizeUploadBtn" title="最小化">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        </button>
        <button class="p-2 rounded hover:bg-gray-100 dark:hover:bg-gray-700" onclick="document.getElementById('uploadModal').classList.add('hidden')" aria-label="关闭">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        </button>
      </div>
    </div>
    <div class="p-4">
      <form class="dropzone dz-clickable border-2 border-dashed border-gray-300 dark:border-gray-600 rounded flex flex-col items-center justify-center py-8" id="uploadDropzone">
        <svg class="w-12 h-12 text-gray-400 mb-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        <h4 class="text-lg font-semibold mb-1">拖放文件到此处或点击选择</h4>
        <span class="text-xs text-gray-400">支持多文件上传，选择后点击开始上传</span>
      </form>
      <div class="flex items-center justify-between mt-4">
        <button class="px-4 py-1 bg-blue-600 text-white rounded hover:bg-blue-700" id="startUploadBtn" disabled>开始上传</button>
        <div class="flex gap-2">
          <button class="px-3 py-1 bg-cyan-100 text-cyan-700 rounded hover:bg-cyan-200" id="clearCompletedBtn" style="display: none;">清空已完成</button>
          <button class="px-3 py-1 bg-red-100 text-red-700 rounded hover:bg-red-200" id="clearQueueBtn" style="display: none;">清空</button>
        </div>
      </div>
      <div class="mt-4">
        <div class="upload-queue-list space-y-2" id="uploadQueueList"></div>
        <div class="mt-2 text-xs text-gray-400" id="uploadStatusInfo">选择文件后点击开始上传...</div>
        <div class="mt-2 text-xs text-blue-500"><svg class="inline w-4 h-4 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>大文件上传可能需要较长时间，请勿关闭窗口。上传成功后会自动刷新文件列表。</div>
      </div>
    </div>
  </div>
</div>
