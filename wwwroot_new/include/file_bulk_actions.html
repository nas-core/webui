<div class="flex items-center gap-2 px-4 py-2 bg-gray-50 dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 text-xs">
  <span class="text-gray-600 dark:text-gray-300" data-count="0">已选择 <span id="selectedCount">0</span> 项</span>
  <button class="px-2 py-1 bg-gray-200 dark:bg-gray-700 rounded hover:bg-gray-300 dark:hover:bg-gray-600" data-action="bulk-select-all">全选</button>
  <button class="px-2 py-1 bg-gray-200 dark:bg-gray-700 rounded hover:bg-gray-300 dark:hover:bg-gray-600" data-action="bulk-invert">反选</button>
  <button class="px-2 py-1 bg-red-600 text-white rounded hover:bg-red-700" data-action="bulk-delete">删除</button>
  <button class="px-2 py-1 bg-blue-600 text-white rounded hover:bg-blue-700" data-action="bulk-cut">剪切</button>
  <button class="px-2 py-1 bg-gray-200 dark:bg-gray-700 rounded hover:bg-gray-300 dark:hover:bg-gray-600" data-action="bulk-copy">复制</button>
  <button class="px-2 py-1 bg-green-600 text-white rounded hover:bg-green-700" data-action="bulk-compress">压缩</button>
  <button class="px-2 py-1 bg-yellow-500 text-white rounded hover:bg-yellow-600" data-action="bulk-paste-cut">粘贴剪切</button>
  <button class="px-2 py-1 bg-cyan-500 text-white rounded hover:bg-cyan-600" data-action="bulk-paste-copy">粘贴复制</button>
  <button class="px-2 py-1 border border-gray-300 dark:border-gray-600 rounded hover:bg-gray-100 dark:hover:bg-gray-700" data-action="bulk-cancel">取消</button>
</div>
