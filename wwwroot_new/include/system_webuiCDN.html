<div id="system_webuiCDN" class="pt-16"></div>
<div class="p-6">
  <h3 class="text-lg font-bold mb-4">WebUI CDN设置</h3>
  <div class="space-y-4">
    <div>
      <label for="WebUIPubLicCdnHeader" class="block">Header</label>
      <textarea class="form-input mt-1 block w-full" id="WebUIPubLicCdnHeader" data-bind="WebUIPubLicCdn.Header"></textarea>
    </div>
    <div>
      <label for="WebUIPubLicCdnFooter" class="block">Footer</label>
      <textarea class="form-input mt-1 block w-full" id="WebUIPubLicCdnFooter" data-bind="WebUIPubLicCdn.Footer"></textarea>
    </div>
    <div>
      <label for="WebUIPubLicCdnDropzone" class="block">Dropzone</label>
      <textarea class="form-input mt-1 block w-full" id="WebUIPubLicCdnDropzone" data-bind="WebUIPubLicCdn.Dropzone"></textarea>
    </div>
    <div>
      <label for="WebUIPubLicCdnArtplayer" class="block">Artplayer</label>
      <textarea class="form-input mt-1 block w-full" id="WebUIPubLicCdnArtplayer" data-bind="WebUIPubLicCdn.Artplayer"></textarea>
    </div>
  </div>
</div>
