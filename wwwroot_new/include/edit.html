<!-- 在线文件编辑模态框 -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 hidden" id="fileEditorModal">
  <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg w-full max-w-2xl relative">
    <div class="flex items-center justify-between px-4 py-2 border-b border-gray-200 dark:border-gray-700">
      <h5 class="text-lg font-semibold flex items-center gap-2" id="fileEditorModalLabel">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>在线编辑
        <small class="ml-2 text-gray-400" id="currentEditFilePath"></small>
      </h5>
      <button class="p-2 rounded hover:bg-gray-100 dark:hover:bg-gray-700" onclick="document.getElementById('fileEditorModal').classList.add('hidden')" aria-label="关闭">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
      </button>
    </div>
    <div class="p-4">
      <textarea id="fileEditorContent" class="w-full h-64 p-2 rounded border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-sm text-gray-800 dark:text-gray-100" rows="20" spellcheck="false"></textarea>
      <div class="flex justify-between items-center mt-2 text-xs text-gray-500 dark:text-gray-400">
        <span>当前文件大小: <span id="editorFileSize">0 B</span></span>
        <span>文件类型: <span id="editorFileType"></span></span>
      </div>
    </div>
    <div class="flex justify-end gap-2 px-4 py-2 border-t border-gray-200 dark:border-gray-700">
      <button class="px-4 py-1 bg-gray-200 dark:bg-gray-700 rounded hover:bg-gray-300 dark:hover:bg-gray-600" onclick="document.getElementById('fileEditorModal').classList.add('hidden')">取消</button>
      <button class="px-4 py-1 bg-blue-600 text-white rounded hover:bg-blue-700" id="saveFileContentBtn">保存</button>
    </div>
    <!-- 可拖动/缩放手柄可后续补充 -->
  </div>
</div>
