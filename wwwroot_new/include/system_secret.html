<div id="system_secret" class="pt-16"></div>
<div class="p-6">
  <h3 class="text-lg font-bold mb-4">密钥配置</h3>
  <div class="space-y-4">
    <div>
      <label for="JwtSecret" class="block">JWT 密钥</label>
      <input type="text" class="form-input mt-1 block w-64" id="JwtSecret" data-bind="Secret.JwtSecret">
    </div>
    <div>
      <label for="Sha256HashSalt" class="block">sha256盐值 (用于单项加密，如用户密码)</label>
      <input type="text" class="form-input mt-1 block w-64" id="Sha256HashSalt" data-bind="Secret.Sha256HashSalt">
    </div>
    <div>
      <label for="AESkey" class="block">AES密钥 (用于加密可解密的配置数据)</label>
      <input type="text" class="form-input mt-1 block w-64" id="AESkey" data-bind="Secret.AESkey">
    </div>
  </div>
</div>
