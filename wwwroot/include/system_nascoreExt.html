<div id="nascoreExt" class="pt-16"></div>
<div class="p-6">
  <h3 class="text-lg font-bold mb-4">NasCore扩展功能</h3>
  <div class="space-y-4">
    <div>
      <label for="UserAccessTokenExpires" class="block">NasCoreID</label>
      <input type="text" class="form-input mt-1 block w-64" id="UserAccessTokenExpires" data-bind="NascoreExt.UserID">
    </div>
    <div>
      <label for="UserAccessTokenExpires" class="block">NasCoreKey</label>
      <input type="text" class="form-input mt-1 block w-64" id="UserAccessTokenExpires" data-bind="NascoreExt.UserKey">
    </div>
    <div class="text-xs text-gray-400">一些非集成到NasCore核心主程序的扩展，需要另外授权使用。<br>如果你没有 NasCoreID 和 NasCoreKey ,请先访问NasCore官网获取。</div>
  </div>
</div>
