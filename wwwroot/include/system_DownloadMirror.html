<!-- GitHub Mirror Modal -->
<div class="modal fixed inset-0 z-50 flex items-center justify-center bg-black/40 hidden" id="githubMirrorModal">
  <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg w-full max-w-lg relative">
    <div class="flex items-center justify-between px-4 py-2 border-b border-gray-200 dark:border-gray-700">
      <h5 class="text-lg font-semibold" id="githubMirrorModalLabel">GitHub 下载镜像设置</h5>
      <button class="p-2 rounded hover:bg-gray-100 dark:hover:bg-gray-700" onclick="document.getElementById('githubMirrorModal').classList.add('hidden')" aria-label="关闭">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
      </button>
    </div>
    <div class="p-4">
      <label for="ThirdPartyExtGitHubDownloadMirror" class="block mb-2">GitHubDownloadMirror</label>
      <input type="text" class="form-input w-full mb-2" id="ThirdPartyExtGitHubDownloadMirror" data-bind="ThirdPartyExt.GitHubDownloadMirror">
      <div class="text-xs text-gray-400 mb-2">如果你的网络环境可以直连github，这里可以删除内容留空<br>镜像站经常失效，如你有域名并托管在cloudflare可参考 <a href="https://nascore.eu.org/zh/docs/nascore_toml.html#GitHubDownloadMirror" target="_blank" class="underline">自行搭建</a></div>
      <div class="flex justify-end">
        <button type="button" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700" data-bs-dismiss="modal">ok</button>
      </div>
    </div>
  </div>
</div>
