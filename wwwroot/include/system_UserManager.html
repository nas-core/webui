<div id="hashUserManager" class="pt-16"></div>
<div class="p-6" id="container_UserManager">
  <h3 class="text-lg font-bold mb-4">用户管理</h3>
  <div class="flex justify-end mb-4">
    <button type="button" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700" id="addUserBtn">添加用户</button>
  </div>
  <div class="overflow-x-auto">
    <table class="min-w-full text-sm text-left text-gray-500 dark:text-gray-300" id="usersTable">
      <thead class="text-xs uppercase bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-gray-200">
        <tr>
          <th class="px-4 py-2">用户名</th>
          <th class="px-4 py-2">密码</th>
          <th class="px-4 py-2">主目录</th>
          <th class="px-4 py-2">管理员</th>
          <th class="px-4 py-2">操作</th>
        </tr>
      </thead>
      <tbody id="usersTableBody" data-bind="Users" data-bind-handler="renderUsersTable">
        <!-- 动态生成用户数据 -->
      </tbody>
    </table>
  </div>
</div>
