<div id="system_jwt" class="pt-16"></div>
<div class="p-6">
  <h3 class="text-lg font-bold mb-4">JWT 配置</h3>
  <div class="space-y-4">
    <div>
      <label for="UserAccessTokenExpires" class="block">用户访问令牌过期时间(秒)</label>
      <input type="number" class="form-input mt-1 block w-32" id="UserAccessTokenExpires" data-bind="JWT.UserAccessTokenExpires">
    </div>
    <div>
      <label for="UserRefreshTokenExpires" class="block">用户刷新令牌过期时间(秒)</label>
      <input type="number" class="form-input mt-1 block w-32" id="UserRefreshTokenExpires" data-bind="JWT.UserRefreshTokenExpires">
    </div>
  </div>
</div>
