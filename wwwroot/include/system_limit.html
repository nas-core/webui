<div id="system_limit" class="pt-16"></div>
<div class="p-6">
  <h3 class="text-lg font-bold mb-4">限制配置</h3>
  <div class="space-y-4">
    <div>
      <label for="OnlineEditMaxSizeKB" class="block">在线编辑最大文件大小(KB)</label>
      <input type="number" class="form-input mt-1 block w-32" id="OnlineEditMaxSizeKB" data-bind="Limit.OnlineEditMaxSizeKB">
    </div>
    <div>
      <label for="MaxFailedLoginsIpMap" class="block">最大失败登录次数(IP)</label>
      <input type="number" class="form-input mt-1 block w-32" id="MaxFailedLoginsIpMap" data-bind="Limit.MaxFailedLoginsIpMap">
    </div>
    <div>
      <label for="MaxFailedLoginSleepTimeSec" class="block">失败登录休眠时间(秒)</label>
      <input type="number" class="form-input mt-1 block w-32" id="MaxFailedLoginSleepTimeSec" data-bind="Limit.MaxFailedLoginSleepTimeSec">
    </div>
  </div>
</div>
