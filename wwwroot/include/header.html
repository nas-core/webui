<header class="w-full bg-white dark:bg-gray-800 shadow-sm flex items-center px-4 h-14">
  <a href="nascore.shtml" class="flex items-center gap-2">
    <img src="images/logo.webp" alt="nascore logo" class="w-8 h-8 rounded" />
    <span class="font-bold text-lg text-gray-800 dark:text-gray-100">NasCore</span>
  </a>
  <div class="ml-auto flex items-center">
    <div class="relative">
      <button class="flex items-center justify-center w-9 h-9 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 focus:outline-none" id="userMenu" type="button">
        <svg class="w-6 h-6 text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5.121 17.804A13.937 13.937 0 0 1 12 15c2.485 0 4.797.657 6.879 1.804M15 11a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/></svg>
      </button>
      <ul class="absolute right-0 mt-2 w-44 bg-white dark:bg-gray-800 rounded shadow-lg py-2 z-50 hidden" id="userMenuDropdown">
        <li class="px-4 py-2 text-gray-700 dark:text-gray-200" id="username"></li>
        <li><a class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200" href="setting.shtml"><svg class="inline w-4 h-4 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>设置</a></li>
        <li><hr class="my-1 border-gray-200 dark:border-gray-700"></li>
        <li><a class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200" href="#" data-action="open-theme-modal"><svg class="inline w-4 h-4 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>主题设置</a></li>
        <li><hr class="my-1 border-gray-200 dark:border-gray-700"></li>
        <li><a class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200" href="javascript:void(0)" onclick="loginOut()"><svg class="inline w-4 h-4 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2h5"/></svg>登出</a></li>
      </ul>
    </div>
  </div>
</header>
<script>
  function loginOut() {
    localStorage.removeItem('jwt_access_token');
    localStorage.removeItem('jwt_access_token_expires');
    localStorage.removeItem('jwt_refresh_token');
    localStorage.removeItem('jwt_refresh_token_expires');
    localStorage.removeItem('clipboard');
    window.location.href = 'login.shtml';
  }
  window.onload = function () {
    const token = localStorage.getItem('jwt_access_token');
    if (token) {
      try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const username = payload.username;
        document.getElementById('username').innerText = username;
      } catch (e) {}
    }
  }
</script>
